<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Game: Character Duels</title>
    <link href = 'duels.css' rel = 'stylesheet'>
</head>

<body>
    <div class = "left">
        <div id = "characterSelected">CHARACTER SELECTED HERE</div>
        <div id = "characterSelection">
            <div id = "selectionRow1">
                <button class = "selection 1">Character 1</button>
                <button class = "selection 2">Character 2</button>
                <button class = "selection 3">Character 3</button>
                <button class = "selection 4">Character 4</button>
                <button class = "selection 5">Character 5</button>
            </div>
            <div id = "selectionRow2">
                <button class = "selection 6">Character 6</button>
                <button class = "selection 7">Character 7</button>
                <button class = "selection 8">Character 8</button>
                <button class = "selection 9">Character 9</button>
                <button class = "selection 10">Character 10</button>
            </div>
        </div>
    </div>

    <div class = "center">
        <img src = "../Misc/VS_Logo.png" alt = "VS icon" id = "vs-icon">
        <button id = "start-game">START</button>
    </div>

    <div class = "right">
        <div id = "botSelected">BOT SELECTED GOES HERE</div>
    </div>



    
    
    <script src = 'duels.js'></script>
</body>
</html>
